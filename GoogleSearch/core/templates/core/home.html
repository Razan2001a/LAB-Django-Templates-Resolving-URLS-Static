{% extends 'core/base.html' %}
{% load static %}

{% block title %}Google{% endblock %}

{% block content %}


<main class="home-page">
    <img src="{% static 'images/google-logo.png' %}" alt="Google Logo" class="google-logo">

    <form action="https://www.google.com/search" method="get" target="_blank" class="search-form">
        <div class="search-box">
            <span class="material-symbols-outlined search-icon">search</span>
            <input type="text" name="q" class="search-input" autocomplete="off">
            <img src="{% static 'images/microphone.png' %}" alt="Microphone" class="search-img-icon">
            <img src="{% static 'images/camera.png' %}" alt="Camera" class="search-img-icon">
        </div>

        <div class="buttons-area">
            <button type="submit" class="search-btn">Google Search</button>
            <button type="submit" name="btnI" value="1" class="search-btn">I'm Feeling Lucky</button>
        </div>
    </form>

    <p class="google-offered">
        Google offered in:
        <a href="#">العربية</a>
    </p>
</main>


{% endblock %}
