{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Google{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>
<body>
    <button class="theme-toggle" onclick="document.body.classList.toggle('dark-mode')">🌙</button>
<header class="top-header">
    <div class="top-right">
        <a href="#">Gmail</a>
        <a href="#">Images</a>
        <span class="material-symbols-outlined apps-icon">apps</span>
        <button class="sign-in-btn">Sign in</button>
    </div>
</header>
    {% block content %}{% endblock %}

<footer class="footer">
    <div class="footer-country">Saudi Arabia</div>
    <div class="footer-links">
        <div class="footer-left">
            <a href="#">About</a>
            <a href="#">Advertising</a>
            <a href="#">Business</a>
            <a href="#">How Search works</a>
        </div>

        <div class="footer-right">
            <a href="#">Privacy</a>
            <a href="{% url 'core:terms' %}">Terms</a>
            <a href="#">Settings</a>
        </div>
    </div>
</footer>
</body>
</html>
